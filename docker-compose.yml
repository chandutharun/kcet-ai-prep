version: '3.8'

services:
  # Ollama Server (for LLMs)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    restart: unless-stopped

  # KCET AI App
  kcet-app:
    build: .
    container_name: kcet-ai-prep
    ports:
      - "8501:8501"
    volumes:
      - ./pdfs:/app/pdfs          # Your NCERT PDFs
      - ./chroma_db:/app/chroma_db # Vector database
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

# Volumes
volumes:
  ollama_data: